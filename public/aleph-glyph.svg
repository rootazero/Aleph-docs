<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Aleph icon — pure-glyph variant.
    Source design: aleph_brand_identity.tsx — the Hebrew letter as the sole symbol
    ("起源 / 万物之始 / 一切计算与逻辑的基石").
    Maximum legibility at every size; cyan ambient halo replaces the pyramid frame.
    Colors: Void Black #050508, Emergent Cyan #22d3ee.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0e1c"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>

    <radialGradient id="halo" cx="50%" cy="52%" r="55%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="55%"  stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="alephCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Squircle plate -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Hairline inner edge -->
  <rect x="4" y="4" width="1016" height="1016" rx="226" ry="226"
        fill="none" stroke="#22d3ee" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Ambient cyan halo -->
  <circle cx="512" cy="532" r="460" fill="url(#halo)"/>

  <!-- Inner glyph glow -->
  <circle cx="512" cy="532" r="280" fill="url(#alephCore)"/>

  <!-- Hebrew aleph — large, dominant. Glow + crisp pass for depth. -->
  <text x="512" y="710"
        font-size="720"
        font-family="'Frank Ruhl Libre','David Libre','Times New Roman','Times','Arial Hebrew',serif"
        text-anchor="middle"
        fill="#ffffff"
        opacity="0.28"
        filter="url(#softGlow)">א</text>

  <text x="512" y="710"
        font-size="720"
        font-family="'Frank Ruhl Libre','David Libre','Times New Roman','Times','Arial Hebrew',serif"
        text-anchor="middle"
        fill="#ffffff">א</text>
</svg>
